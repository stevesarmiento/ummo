# Legacy Anchor workspace config (kept for reference).
# The on-chain program is now built with Quasar. See `Quasar.toml` and `quasar build`.

[toolchain]
package_manager = "bun"

[features]
resolution = true
skip-lint = false

[programs.localnet]
ummo_market = "4AboEjY4zXBF5QmDQCPT4XnaaU3pEGnCDuVy5HzR9T8e"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "bunx ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""
